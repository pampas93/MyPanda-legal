<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyPanda Legal</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: #111a2e;
        --text: #e5edf8;
        --muted: #9fb1ca;
        --link: #7db0ff;
        --border: #21314b;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 28px;
      }
      p {
        color: var(--muted);
        margin: 0 0 16px 0;
      }
      a {
        color: var(--link);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      ul {
        margin: 0;
        padding-left: 18px;
      }
      li {
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>MyPanda Legal</h1>
        <p>Legal documents for MyPanda.</p>
        <ul>
          <li><a href="./terms/">Terms of Service</a></li>
          <li><a href="./privacy/">Privacy Policy</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
